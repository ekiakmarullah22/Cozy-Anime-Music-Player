<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cozy Music Player</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <video 
    class="bg-video" 
    autoplay 
    muted 
    loop 
    playsinline 
    preload="none" 
    poster="assets/images/Hatsune Miku.png">
  </video>
  <div class="bg-overlay"></div>

  <main class="app">
    <header class="brand">
      <span class="dot"></span>
      <h1>Cozy Music Player</h1>
    </header>

    <!-- Upload Screen -->
    <section id="uploadScreen" class="card upload-card">
      <div class="upload-icon">♪</div>
      <h2>Welcome, Otaku~</h2>
      <p>Pilih file audio favoritmu untuk memulai sesi cozy malam ini.</p>
      <label for="fileInput" class="upload-btn">
        <span>Upload Audio</span>
      </label>
      <input id="fileInput" type="file" accept="audio/*" hidden />
      <span class="hint">.mp3 · .wav · .ogg · .m4a</span>
    </section>

    <!-- Player + Playlist Layout -->
    <div id="playerScreen" class="player-layout hidden">
      <section class="card player-card">
        <div class="track-info">
          <div class="track-title" id="trackTitle">Untitled Track</div>
          <div class="track-sub">Now playing</div>
        </div>

        <canvas id="visualizer" class="visualizer"></canvas>

        <div class="progress">
          <span id="currentTime">0:00</span>
          <input id="seek" type="range" min="0" max="100" value="0" step="0.1" />
          <span id="duration">0:00</span>
        </div>

        <div class="controls">
          <button id="prevBtn" class="ctrl" title="Restart" aria-label="Restart">
            <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zM9.5 12l8.5 6V6z"/></svg>
          </button>
          <button id="playBtn" class="ctrl ctrl-main" aria-label="Play/Pause">
            <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <svg id="pauseIcon" viewBox="0 0 24 24" class="hidden"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
          </button>
          <button id="nextBtn" class="ctrl" title="Forward 10s" aria-label="Forward">
            <svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zM6 18l8.5-6L6 6z"/></svg>
          </button>
        </div>

        <div class="extra">
          <div class="vol">
            <svg viewBox="0 0 24 24" class="vol-icon"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
            <input id="volume" type="range" min="0" max="1" step="0.01" value="0.8" />
          </div>
          <label for="addMoreInput" class="text-btn" id="addMoreBtn">+ Add audio</label>
          <input id="addMoreInput" type="file" accept="audio/*" hidden />
          <button id="changeBtn" class="text-btn">Reset</button>
        </div>

        <audio id="audio"></audio>
      </section>

      <aside class="card playlist-card">
        <div class="playlist-head">
          <h3>Playlist</h3>
          <span id="playlistCount" class="playlist-count">0</span>
        </div>
        <ul id="playlist" class="playlist"></ul>
        <p id="playlistEmpty" class="playlist-empty hidden">Belum ada audio.</p>
      </aside>
    </div>
  </main>

  <script src="assets/js/app.js"></script>
</body>
</html>
